[build]
builder = "nixpacks"

[deploy]
startCommand = "/bin/sh -c \"gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000}\""
healthcheckPath = "/api/schema/"
healthcheckTimeout = 30

[[deploy.releaseCommands]]
command = "python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed"
